services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - simplyfiles_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - ./data/files:/app/data/files
    networks:
      - simplyfiles_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        MAX_FOLDER_DEPTH: ${MAX_FOLDER_DEPTH:-5}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - simplyfiles_net
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  simplyfiles_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
