server {
    listen 23739;
    root /usr/share/nginx/html;
    index index.html;

    # Match MAX_UPLOAD_SIZE (500 MiB)
    client_max_body_size 500M;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/opentype;
    gzip_min_length 1024;
    gzip_vary on;

    # API proxy — forward to backend container named "api" on port 3001
    location /api/ {
        proxy_pass         http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Upload timeout (large files)
        proxy_read_timeout    300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;

        # Disable response buffering for file downloads
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # Hashed assets (Vite output) — immutable, cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — all unmatched paths serve index.html (also no-cache)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
